<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=340">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="popup-header">
      <div class="popup-brand">
        <img src="icons/icon48.png" alt="" class="popup-logo">
        <div>
          <h1 class="popup-title">LinkedIn Post Date</h1>
          <p class="popup-subtitle">See exact dates on posts</p>
        </div>
      </div>
    </header>

    <div class="popup-body">
      <div class="feature-group">
        <div class="feature-item">
          <div class="feature-info">
            <div class="feature-icon">&#128197;</div>
            <div>
              <div class="feature-name">Show Post Dates</div>
              <div class="feature-desc">Display the real date on every post</div>
            </div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggle-showDates" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="feature-item sub-setting" id="dateFormatRow">
          <div class="feature-info">
            <div class="feature-icon"></div>
            <div>
              <div class="feature-name format-label">Date format</div>
            </div>
          </div>
          <select id="dateFormat" class="format-select">
            <option value="short">6/18, 3:42 PM</option>
            <option value="long">Jun 18, 2026, 3:42 PM</option>
            <option value="iso">06/18/2026, 15:42</option>
          </select>
        </div>
      </div>
    </div>

    <footer class="popup-footer">
      <span class="popup-version">v1.0.0</span>
      <a href="https://github.com/sbui056/linkedin-post-date" target="_blank" class="popup-link">GitHub</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
